name: Build Android APK

# Manual trigger only — open the Actions tab, pick this workflow and click
# "Run workflow". The build runs on an Ubuntu runner (free & unlimited for
# public repos), which avoids both the EAS build quota and the Windows
# native-build path-space problem. The installable APK is uploaded as an
# artifact you can download from the run summary.
on:
  workflow_dispatch:
    inputs:
      debug_mode:
        description: "Enable in-app debug tools (debug screen/FAB)"
        type: boolean
        default: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    defaults:
      run:
        working-directory: mobile

    env:
      # Public build-time config (inlined into the JS bundle). No secrets here —
      # the device talks to the server, which holds the Cloudinary/DB credentials.
      EXPO_PUBLIC_API_URL: https://maizai.vercel.app
      EXPO_PUBLIC_SUPPORT_EMAIL: johnpokam95@gmail.com
      EXPO_PUBLIC_DEBUG_MODE: ${{ inputs.debug_mode }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install required NDK and CMake
        run: |
          yes | sdkmanager "ndk;27.1.12297006" "cmake;3.22.1" >/dev/null

      - name: Install dependencies
        run: npm ci

      - name: Prebuild native Android project
        run: npx expo prebuild --platform android --no-install

      - name: Assemble release APK
        working-directory: mobile/android
        run: ./gradlew assembleRelease --no-daemon -Dorg.gradle.jvmargs=-Xmx4g

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: maizai-release-apk
          path: mobile/android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error
          retention-days: 14

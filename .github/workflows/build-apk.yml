name: Build Android APK

# Manual trigger — open the Actions tab, pick this workflow and click
# "Run workflow". The build runs on an Ubuntu runner (free & unlimited for
# public repos), which avoids both the EAS build quota and the Windows
# native-build path-space problem. On success the installable APK is uploaded
# as a run artifact AND published as a GitHub Release, which the website's
# "Download for Android" button fetches automatically (latest release).
on:
  workflow_dispatch:
    inputs:
      debug_mode:
        description: "Enable in-app debug tools (debug screen/FAB)"
        type: boolean
        default: true
      publish_release:
        description: "Publish a GitHub Release with the APK"
        type: boolean
        default: true
  # Auto-build whenever the mobile app source or the bundled model changes on
  # main. GitHub Actions is free/unlimited for public repos, so every such push
  # produces a fresh APK + Release that the website download button points at.
  push:
    branches: [main]
    paths:
      - "mobile/**"
      - "ai/models/maize_classifier.tflite"
      - ".github/workflows/build-apk.yml"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    defaults:
      run:
        working-directory: mobile

    env:
      # Public build-time config (inlined into the JS bundle). No secrets here —
      # the device talks to the server, which holds the Cloudinary/DB credentials.
      EXPO_PUBLIC_API_URL: https://maizai.vercel.app
      EXPO_PUBLIC_SUPPORT_EMAIL: johnpokam95@gmail.com
      # Debug tools on by default (incl. push builds, while still testing);
      # only a manual run that unticks "debug_mode" turns them off.
      EXPO_PUBLIC_DEBUG_MODE: ${{ inputs.debug_mode == false && 'false' || 'true' }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install required NDK and CMake
        run: |
          yes | sdkmanager "ndk;27.1.12297006" "cmake;3.22.1" >/dev/null

      - name: Install dependencies
        run: npm ci

      - name: Prebuild native Android project
        run: npx expo prebuild --platform android --no-install

      - name: Assemble release APK
        working-directory: mobile/android
        run: ./gradlew assembleRelease --no-daemon -Dorg.gradle.jvmargs=-Xmx4g

      - name: Read app version
        id: ver
        run: echo "version=$(node -p "require('./app.json').expo.version")" >> "$GITHUB_OUTPUT"

      - name: Stage APK as maizai.apk
        run: cp android/app/build/outputs/apk/release/app-release.apk maizai.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: maizai-release-apk
          path: mobile/maizai.apk
          if-no-files-found: error
          retention-days: 14

      - name: Publish GitHub Release
        # Always publish on push; on a manual run, honour the publish_release input.
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.publish_release }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.ver.outputs.version }}-build.${{ github.run_number }}
          name: MaizAI v${{ steps.ver.outputs.version }} (build ${{ github.run_number }})
          body: |
            Automated build of MaizAI for Android.

            - Version: ${{ steps.ver.outputs.version }}
            - Build: ${{ github.run_number }}
            - Commit: ${{ github.sha }}

            Download `maizai.apk` below and tap it on your Android device to install.
          files: mobile/maizai.apk
          make_latest: true
